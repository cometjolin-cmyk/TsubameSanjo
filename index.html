                    product: '薄型輕量活動扳手',
                    highlight: '在維持極高強度的前提下，將扳手頭部做到「世界最薄」，以應對狹窄空間。',
                    view: 'TOP 的特色在於「硬核的安全感」。針對高空作業設計的防掉落結構，展現出對建築職人生命安全的高度責任感。'
                }
            },
            // --- 🟦 戶外與生活風格 ---
            {
                id: 'village',
                category: '戶外與生活風格',
                company: 'Village Blacksmith (村之鍛冶屋)',
                tagline: '露營美學的鋼鐵骨氣',
                website: 'https://www.muranokajiya.jp/',
                image: 'https://muranokajiya.itembox.cloud/item/slider3.jpg?t=20260404111511',
                tags: ['橢圓營釘', '繽紛電著', '降維打擊'],
                business: { what: '風格露營五金開發', who: '露營愛好者、生活選物店', how: 'D2C 社群行銷與粉絲經濟' },
                strengths: ['解決營釘自轉問題的橢圓結構', '極速回應市場需求的 D2C 能力', '精準的社群內容行銷與粉絲經營'],
                consultant: {
                    product: '橢圓鍛造營釘 (Ellisse Stake)',
                    highlight: '改變傳統圓形營釘，採用橢圓截面。這項細微的設計改變，讓營釘在地表下不自轉，且轉向即可拔起。',
                    view: '他們的特色產品習慣用「繽紛的電著塗裝」來包裹堅硬的鍛造鋼。這種「柔與剛」的對比，成功讓生硬的建築五金變成了令人渴望的露營精品。'
                }
            }
        ];

        function renderSlide() {
            const container = document.getElementById('slide-container');
            const indicator = document.getElementById('slide-indicator');
            const data = slides[currentSlide];
            
            indicator.innerText = `Slide ${currentSlide + 1} / ${slides.length}`;
            
            if (data.type === 'cover') {
                container.innerHTML = `
                    <div class="rounded-3xl p-12 text-white h-[600px] flex flex-col justify-center items-center text-center shadow-2xl relative overflow-hidden bg-stone-900 slide-enter">
                        <img src="${data.image}" class="absolute inset-0 w-full h-full object-cover opacity-30" alt="Cover">
                        <div class="absolute inset-0 bg-gradient-to-br from-stone-800/80 to-stone-900/40"></div>
                        <h2 class="text-4xl md:text-6xl font-extrabold mb-6 relative z-10 leading-tight">${data.title}</h2>
                        <p class="text-xl md:text-2xl text-stone-300 mb-8 relative z-10 font-light">${data.subtitle}</p>
                        <div class="bg-white/10 backdrop-blur-md px-6 py-3 rounded-xl border border-white/20 relative z-10 text-stone-100">${data.meta}</div>
                        <button onclick="nextSlide()" class="mt-12 bg-pantone-gold text-white px-10 py-4 rounded-full font-bold flex items-center gap-3 hover:brightness-110 transition shadow-lg relative z-10">開始閱讀報告 <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 slide-enter">
                        <div class="lg:col-span-8 space-y-6">
                            <div class="w-full h-64 md:h-80 rounded-3xl overflow-hidden shadow-md img-gradient border border-stone-200">
                                <img src="${data.image}" class="w-full h-full object-cover" alt="${data.company}" onerror="this.src='https://via.placeholder.com/800x400?text=Image+Not+Found'">
                            </div>

                            <div class="bg-pantone-gold text-white rounded-3xl p-8 shadow-lg relative overflow-hidden">
                                <div class="absolute -right-10 -top-10 text-white/10 rotate-12"><i class="fa-solid fa-building text-[200px]"></i></div>
                                <div class="relative z-10">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="flex flex-col gap-1">
                                            <span class="text-xs font-bold uppercase bg-stone-900/20 px-3 py-1 rounded-full border border-white/20 w-fit">${data.category}</span>
                                            <span class="text-sm opacity-90 ml-1">創業：${data.established}</span>
                                        </div>
                                        ${data.website ? `<a href="${data.website}" target="_blank" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition backdrop-blur-sm border border-white/30">官方網站 <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i></a>` : ''}
                                    </div>
                                    <h2 class="text-3xl font-bold mb-2">${data.company}</h2>
                                    <p class="text-xl text-stone-100 mb-6 italic font-light">「${data.tagline}」</p>
                                    <div class="flex flex-wrap gap-2 mb-6">${data.tags.map(tag => `<span class="bg-white/20 text-xs px-2 py-1 rounded-md border border-white/30 backdrop-blur-sm">#${tag}</span>`).join('')}</div>
                                    <div class="bg-black/10 p-4 rounded-xl border border-white/10 flex gap-3"><i class="fa-solid fa-circle-info shrink-0 mt-1"></i><p class="text-sm leading-relaxed">${data.overview}</p></div>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="bg-stone-100 border border-stone-200 p-6 rounded-2xl"><div class="flex items-center gap-2 mb-3 text-stone-700 font-bold"><i class="fa-solid fa-layer-group text-pantone-olive"></i><h3>業務內容</h3></div><p class="text-sm text-stone-600 leading-relaxed">${data.business.what}</p></div>
                                <div class="bg-stone-100 border border-stone-200 p-6 rounded-2xl"><div class="flex items-center gap-2 mb-3 text-stone-700 font-bold"><i class="fa-solid fa-bullseye text-pantone-gold"></i><h3>關鍵客群</h3></div><p class="text-sm text-stone-600 leading-relaxed">${data.business.who}</p></div>
                                <div class="bg-stone-100 border border-stone-200 p-6 rounded-2xl"><div class="flex items-center gap-2 mb-3 text-stone-700 font-bold"><i class="fa-solid fa-coins text-pantone-clay"></i><h3>收益模式</h3></div><p class="text-sm text-stone-600 leading-relaxed">${data.business.how}</p></div>
                            </div>

                            <div class="bg-white border border-stone-200 p-8 rounded-2xl border-l-8 border-l-pantone-olive shadow-sm">
                                <div class="flex items-center gap-2 mb-6 text-stone-800 font-bold"><i class="fa-solid fa-medal text-pantone-olive"></i><h3>特色與競爭力</h3></div>
                                <ul class="space-y-4">
                                    ${data.strengths.map((str, idx) => `<li class="flex gap-4 text-stone-700 items-start"><span class="shrink-0 w-6 h-6 bg-stone-50 border border-stone-200 rounded-full flex items-center justify-center text-xs font-bold text-pantone-olive">${idx + 1}</span><span class="leading-relaxed font-medium">${str}</span></li>`).join('')}
                                </ul>
                            </div>
                        </div>
                        
                        <div class="lg:col-span-4 h-full">
                            <div class="bg-stone-50 border border-stone-200 p-6 rounded-3xl shadow-inner flex flex-col h-full sticky top-24">
                                <div class="flex items-center gap-2 mb-6 text-stone-800 font-bold"><i class="fa-solid fa-pen-nib text-pantone-olive text-xl"></i><h3 class="text-xl">深層建議</h3></div>
                                <div class="space-y-4 flex-1">
                                    <div class="p-5 bg-white rounded-2xl border border-stone-200 shadow-sm border-l-4 border-l-pantone-olive">
                                        <h4 class="text-xs font-black uppercase text-pantone-olive mb-3 flex items-center gap-1"><i class="fa-solid fa-star"></i> 特色產品</h4>
                                        <p class="text-sm text-stone-800 font-bold leading-relaxed mb-1">${data.consultant.product}</p>
                                    </div>
                                    <div class="p-5 bg-stone-100 rounded-2xl border border-stone-200 shadow-sm">
                                        <h4 class="text-xs font-black uppercase text-pantone-gold mb-3 flex items-center gap-1"><i class="fa-solid fa-eye"></i> 工藝亮點</h4>
                                        <p class="text-sm text-stone-700 leading-relaxed">${data.consultant.highlight}</p>
                                    </div>
                                    <div class="p-5 bg-stone-800 rounded-2xl border border-stone-700 shadow-lg text-stone-100">
                                        <h4 class="text-xs font-black uppercase text-pantone-gold mb-3 flex items-center gap-1"><i class="fa-solid fa-quote-left"></i> 公司特點</h4>
                                        <p class="text-sm leading-relaxed text-stone-200 font-light">${data.consultant.view}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            renderDots();
        }

        function renderDots() {
            const dots = document.getElementById('dot-navigation');
            dots.innerHTML = slides.map((_, idx) => `
                <button onclick="goToSlide(${idx})" class="w-3 h-3 rounded-full transition-all duration-300 ${currentSlide === idx ? 'bg-pantone-gold w-8' : 'bg-stone-300 hover:bg-stone-400'}"></button>
            `).join('');
        }

        function nextSlide() { currentSlide = (currentSlide + 1) % slides.length; renderSlide(); }
        function prevSlide() { currentSlide = (currentSlide - 1 + slides.length) % slides.length; renderSlide(); }
        function goToSlide(idx) { currentSlide = idx; renderSlide(); }

        window.onload = renderSlide;
    </script>
</body>
</html>
